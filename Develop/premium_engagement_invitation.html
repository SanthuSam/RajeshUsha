
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajesh & Usha Engagement</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cinzel', serif;
background: radial-gradient(circle at top,#8b0000,#3b0000);
color:white;
overflow-x:hidden;
}

/* hero */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background-image:url("https://images.unsplash.com/photo-1523438885200-e635ba2c371e");
background-size:cover;
background-position:center;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(90,0,0,0.7);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-family:'Great Vibes', cursive;
font-size:70px;
}

/* ring animation */

.ring{
font-size:80px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* petals */

.petal{
position:fixed;
top:-10px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(100vh)}
}

/* card */

.invite-card{
background:white;
color:#333;
border-radius:20px;
padding:50px;
box-shadow:0 25px 60px rgba(0,0,0,0.5);
margin-top:-100px;
position:relative;
z-index:3;
}

/* photo */

.photo{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
border:8px solid gold;
transition:0.4s;
}

.photo:hover{
transform:scale(1.1);
}

/* button */

.btn-gold{
background:#d4af37;
border:none;
padding:14px 30px;
border-radius:40px;
font-weight:bold;
color:white;
}

.btn-gold:hover{
background:#c9a227;
}

.section-title{
font-family:'Great Vibes', cursive;
font-size:45px;
color:#8b0000;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4df8dcb6f4.mp3" type="audio/mpeg">
</audio>

<script>

// flower petals
for(let i=0;i<40;i++){
let petal=document.createElement("div");
petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(petal);
}

</script>


<div class="hero">

<div class="overlay"></div>

<div class="hero-content">

<div class="ring">💍</div>

<h2>Please join us to celebrate</h2>

<h1>Rajesh & Usha</h1>

<p style="font-size:22px;">Engagement Ceremony</p>

<a href="#invite">
<button class="btn btn-gold mt-3">Open Invitation</button>
</a>

</div>

</div>


<div class="container" id="invite">

<div class="invite-card text-center">

<h2 class="section-title">Together with their families</h2>

<p class="mt-3">
request the pleasure of your presence<br>
at the engagement ceremony of
</p>

<h1 style="font-family:'Great Vibes'; font-size:60px; color:#8b0000;">
Rajesh & Usha
</h1>

<p><b>23 March 2026</b></p>

<p>
Siddamma Channappa Kalyana Mantapa<br>
Beladhara, Karnataka 572106
</p>


<div class="row mt-5">

<div class="col-md-6 text-center">

<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e" class="photo">
<h4 class="mt-3">Rajesh</h4>

</div>

<div class="col-md-6 text-center">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330" class="photo">
<h4 class="mt-3">Usha</h4>

</div>

</div>


<a href="https://maps.app.goo.gl/rNfr2eQVGv4naELd7" target="_blank">
<button class="btn btn-gold mt-4">📍 View Location</button>
</a>

</div>

</div>

</body>
</html>
